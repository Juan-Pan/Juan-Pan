name: generate badges

on:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist directory
        run: mkdir -p dist

      - name: Download readme stats
        run: |
          curl -sSL "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&theme=dark&show_icons=true&count_private=true" -o dist/readme-stats.svg

      - name: Download streak stats
        run: |
          curl -sSL "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=dark&hide_border=false" -o dist/streak-stats.svg

      - name: Download top langs
        run: |
          curl -sSL "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&count_private=true&theme=dark&hide_border=false&langs_count=10" -o dist/top-langs.svg

      - name: Commit and push badges to output branch (preserve existing files)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin output; then
            git fetch origin output:output
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . || true
          fi
          mkdir -p output_tmp
          cp -r dist/* output_tmp/ || true
          cp -r output_tmp/* .
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to output branch"
          else
            git commit -m "chore: update badges (readme/streak/top-langs)"
            git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }} output
          fi
