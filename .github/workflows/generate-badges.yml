name: generate badges

on:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist directory
        run: mkdir -p dist

      - name: Download readme stats
        run: |
          curl -sSL "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&theme=dark&show_icons=true&count_private=true" -o dist/readme-stats.svg

      - name: Download streak stats
        run: |
          curl -sSL "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=dark&hide_border=false" -o dist/streak-stats.svg

      - name: Download top langs
        run: |
          curl -sSL "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&count_private=true&theme=dark&hide_border=false&langs_count=10" -o dist/top-langs.svg

      - name: Push badges to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
