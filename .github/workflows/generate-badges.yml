name: generate badges

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 1

      - name: Download stats badges with cache-busting
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Add timestamp for cache-busting
          TIMESTAMP=$(date +%s)
          USERNAME="${{ github.repository_owner }}"
          
          echo "Downloading badges for user: $USERNAME"
          
          # Download readme stats (with retries)
          for i in {1..3}; do
            if curl -f -L "https://github-readme-stats.vercel.app/api?username=$USERNAME&theme=dark&show_icons=true&count_private=true&include_all_commits=true&cache_seconds=0&v=$TIMESTAMP" -o readme-stats.svg; then
              echo "✓ Downloaded readme-stats.svg"
              break
            else
              echo "Attempt $i failed for readme-stats.svg"
              sleep 5
            fi
          done
          
          # Download streak stats using GitHub token (with retries and fallback)
          # Try demolab first (more reliable)
          for i in {1..3}; do
            # Use token via query param for authentication
            if curl -f -L "https://streak-stats.demolab.com?user=$USERNAME&theme=dark&hide_border=false&date_format=M%20j%5B%2C%20Y%5D&token=$GITHUB_TOKEN&v=$TIMESTAMP" -o streak-stats.svg 2>/dev/null; then
              # Check if SVG contains error
              if ! grep -q "Failed to retrieve" streak-stats.svg 2>/dev/null; then
                echo "✓ Downloaded streak-stats.svg from demolab"
                break
              fi
            fi
            
            # Fallback to herokuapp with token
            if curl -f -L "https://github-readme-streak-stats.herokuapp.com?user=$USERNAME&theme=dark&hide_border=false&token=$GITHUB_TOKEN&v=$TIMESTAMP" -o streak-stats.svg 2>/dev/null; then
              if ! grep -q "Failed to retrieve" streak-stats.svg 2>/dev/null; then
                echo "✓ Downloaded streak-stats.svg from herokuapp"
                break
              fi
            fi
            
            echo "Attempt $i failed for streak-stats.svg"
            sleep 5
          done
          
          # Download top langs (with retries and explicit parameters)
          # Hide Jupyter Notebook to show actual programming languages
          for i in {1..3}; do
            if curl -f -L "https://github-readme-stats.vercel.app/api/top-langs/?username=$USERNAME&theme=dark&hide_border=false&include_all_commits=true&count_private=true&layout=compact&langs_count=10&hide=jupyter%20notebook&exclude_repo=&cache_seconds=0&v=$TIMESTAMP" -o top-langs.svg; then
              echo "✓ Downloaded top-langs.svg"
              break
            else
              echo "Attempt $i failed for top-langs.svg"
              sleep 5
            fi
          done
          
          # Verify files
          echo ""
          echo "Verifying downloaded files:"
          for file in readme-stats.svg streak-stats.svg top-langs.svg; do
            if [ -f "$file" ]; then
              size=$(wc -c < "$file")
              echo "  $file: ${size} bytes"
              # Check for common error patterns
              if grep -q "Failed to" "$file" 2>/dev/null; then
                echo "    ⚠ Warning: Contains error message"
              fi
            else
              echo "  $file: MISSING"
            fi
          done

      - name: Commit and push updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add *.svg
          
          if git diff --staged --quiet; then
            echo "No changes to badges"
          else
            git commit -m "chore: update stats badges [automated $(date +'%Y-%m-%d %H:%M')]"
            git push origin output
          fi
