name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main branch
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Generate the snake animation
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Merge generated files into the output branch (preserve existing files)
      - name: Commit and push generated snake to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # fetch output branch if it exists
          if git ls-remote --exit-code --heads origin output; then
            git fetch origin output:output
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . || true
          fi
          # copy generated files into branch root (overwrite only those files)
          mkdir -p output_tmp
          cp -r dist/* output_tmp/ || true
          cp -r output_tmp/* .
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to output branch"
          else
            git commit -m "chore: update github-contribution-grid-snake.svg"
            git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }} output
          fi

