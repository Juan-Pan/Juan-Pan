name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main branch
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate the snake animation
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Checkout output branch and merge files
      - name: Checkout output branch
        run: |
          git fetch origin output:output || git checkout --orphan output
          git checkout output

      - name: Update snake in output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Copy new snake files to root (overwrite old ones)
          cp -f dist/*.svg . 2>/dev/null || true
          
          # Clean up temporary directories if they exist
          rm -rf dist/ output_tmp/ 2>/dev/null || true
          
          git add *.svg
          
          if git diff --staged --quiet; then
            echo "No changes to snake animation"
          else
            git commit -m "chore: update snake animation [automated $(date +'%Y-%m-%d %H:%M')]"
            git push origin output
          fi

